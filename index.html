<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boletim de Câmera</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --accent: #e8c84a;
      --accent-dim: #c4a832;
      --ok: #4caf50;
      --ng: #f44336;
      --text: #e8e8e8;
      --muted: #888;
      --radius: 10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      font-size: 28px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--accent);
    }

    header p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 14px;
      overflow-x: hidden;
    }

    /* --- PROJECT HEADER --- */
    .project-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .project-bar label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    #projectTitle {
      flex: 1;
      min-width: 200px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
    }

    #projectTitle:focus {
      border-color: var(--accent);
    }

    #projectTitle::placeholder {
      color: var(--muted);
      font-weight: 400;
    }

    /* --- FORM --- */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 520px) {
      .form-card { padding: 14px 12px; }
      .project-bar { padding: 14px 12px; flex-direction: column; align-items: stretch; }
      #projectTitle { min-width: 0; }
    }

    .form-card h2 {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr auto;
      gap: 14px;
      align-items: end;
    }

    @media (max-width: 860px) {
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }
      .btn-add {
        grid-column: 1 / -1;
        width: 100%;
        padding: 14px;
        font-size: 1rem;
      }
    }

    @media (max-width: 520px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      .btn-add {
        grid-column: 1;
      }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .field input,
    .field textarea,
    .field select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.92rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--accent);
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: #555;
    }

    .field textarea {
      resize: vertical;
      min-height: 62px;
    }

    /* Stepper control */
    .stepper {
      display: flex;
      align-items: stretch;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      height: 52px;
      width: 100%;
      min-width: 0;
    }

    .stepper button {
      background: var(--surface2);
      border: none;
      color: var(--text);
      font-size: 1.4rem;
      font-weight: 300;
      width: 48px;
      min-width: 48px;
      cursor: pointer;
      transition: background .15s, color .15s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .stepper button:hover { background: #2e2e2e; color: var(--accent); }
    .stepper button:active { background: #383838; }

    .stepper .step-val {
      flex: 1;
      width: 0;
      min-width: 0;
      background: var(--surface2);
      border: none;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      color: var(--text);
      font-size: 1.15rem;
      font-weight: 700;
      text-align: center;
      outline: none;
      font-family: inherit;
      letter-spacing: 1px;
    }

    .stepper .step-val:focus {
      background: #2a2a2a;
    }

    /* Status toggle */
    .status-toggle {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      height: 52px;
    }

    .status-toggle input[type="radio"] {
      display: none;
    }

    .status-toggle label {
      flex: 1;
      text-align: center;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: var(--surface2);
      color: var(--muted);
      transition: all .2s;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #statusOK:checked ~ .toggle-labels label[for="statusOK"],
    .status-toggle input[value="OK"]:checked + label {
      background: var(--ok);
      color: #fff;
    }

    #statusNG:checked ~ .toggle-labels label[for="statusNG"],
    .status-toggle input[value="NG"]:checked + label {
      background: var(--ng);
      color: #fff;
    }

    .btn-add {
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 6px;
      padding: 10px 22px;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, transform .1s;
      height: fit-content;
    }

    .btn-add:hover { background: var(--accent-dim); }
    .btn-add:active { transform: scale(0.97); }

    /* Description row */
    .desc-row {
      margin-top: 14px;
      grid-column: 1 / -1;
    }

    /* --- TABLE --- */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    #tableWrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }

    .table-header h2 {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .table-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-pdf {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all .2s;
    }

    .btn-pdf:hover {
      background: var(--accent);
      color: #111;
    }

    .btn-clear {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-clear:hover {
      border-color: var(--ng);
      color: var(--ng);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      min-width: 540px;
    }

    thead th {
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 11px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #1f1f1f;
      transition: background .15s;
    }

    tbody tr:hover { background: #1e1e1e; }
    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 12px 14px;
      vertical-align: middle;
    }

    .tag-ok {
      background: rgba(76,175,80,.15);
      color: var(--ok);
      border: 1px solid rgba(76,175,80,.3);
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      display: inline-block;
    }

    .tag-ng {
      background: rgba(244,67,54,.15);
      color: var(--ng);
      border: 1px solid rgba(244,67,54,.3);
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      display: inline-block;
    }

    .desc-text {
      color: var(--muted);
      font-size: 0.82rem;
      font-style: italic;
      max-width: 260px;
    }

    .btn-del {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 1rem;
      transition: color .2s;
      padding: 4px;
    }

    .btn-del:hover { color: var(--ng); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 20px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
      font-size: 0.78rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .stat strong { font-weight: 700; }
    .stat-ok strong { color: var(--ok); }
    .stat-ng strong { color: var(--ng); }

    /* Notification */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--accent);
      color: #111;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.85rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all .3s;
      pointer-events: none;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🎬</span>
  <div>
    <h1>Boletim de Câmera</h1>
    <p>Registro de takes para produção de vídeo</p>
  </div>
</header>

<main>
  <!-- Project title -->
  <div class="project-bar">
    <label for="projectTitle">Título do Vídeo</label>
    <input type="text" id="projectTitle" placeholder="Nome do projeto / vídeo..." />
  </div>

  <!-- Form -->
  <div class="form-card">
    <h2>Adicionar Take</h2>
    <div class="form-grid">
      <div class="field">
        <label>Arquivo</label>
        <div class="stepper">
          <button type="button" onclick="stepNum('fArquivo', -1)" title="Diminuir">−</button>
          <input class="step-val" type="text" id="fArquivo" value="1" inputmode="numeric" />
          <button type="button" onclick="stepNum('fArquivo', +1)" title="Aumentar">+</button>
        </div>
      </div>
      <div class="field">
        <label>Cena</label>
        <div class="stepper">
          <button type="button" onclick="stepNum('fCena', -1)" title="Diminuir">−</button>
          <input class="step-val" type="text" id="fCena" value="1" inputmode="numeric" />
          <button type="button" onclick="stepNum('fCena', +1)" title="Aumentar">+</button>
        </div>
      </div>
      <div class="field">
        <label>Plano</label>
        <div class="stepper">
          <button type="button" onclick="stepAlpha('fPlano', -1)" title="Letra anterior">−</button>
          <input class="step-val" type="text" id="fPlano" value="A" maxlength="2" />
          <button type="button" onclick="stepAlpha('fPlano', +1)" title="Próxima letra">+</button>
        </div>
      </div>
      <div class="field">
        <label>Take</label>
        <div class="stepper">
          <button type="button" onclick="stepNum('fTake', -1)" title="Diminuir">−</button>
          <input class="step-val" type="text" id="fTake" value="1" inputmode="numeric" />
          <button type="button" onclick="stepNum('fTake', +1)" title="Aumentar">+</button>
        </div>
      </div>
      <div class="field">
        <label>Status</label>
        <div class="status-toggle" id="statusToggle">
          <input type="radio" name="status" id="statusOK" value="OK" checked />
          <label for="statusOK">OK</label>
          <input type="radio" name="status" id="statusNG" value="NG" />
          <label for="statusNG">NG</label>
        </div>
      </div>
      <button class="btn-add" onclick="addTake()">+ Adicionar</button>
    </div>
    <div class="form-grid">
      <div class="field desc-row" style="grid-column: 1 / -1">
        <label>Descrição / Observação</label>
        <textarea id="fDesc" placeholder="Notas sobre o take, problemas, ajustes..."></textarea>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-header">
      <h2>Takes Registrados</h2>
      <div class="table-actions">
        <button class="btn-pdf" onclick="generatePDF()">⬇ Exportar PDF</button>
        <button class="btn-clear" onclick="clearAll()">Limpar Tudo</button>
      </div>
    </div>

    <div id="tableWrap">
      <div class="empty-state" id="emptyState">
        <div class="icon">🎞️</div>
        <p>Nenhum take registrado ainda.<br>Preencha o formulário acima e clique em <strong>Adicionar</strong>.</p>
      </div>
      <table id="takesTable" style="display:none">
        <thead>
          <tr>
            <th>#</th>
            <th>Vídeo</th>
            <th>Arquivo</th>
            <th>Cena</th>
            <th>Plano</th>
            <th>Take</th>
            <th>Status</th>
            <th>Descrição</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="takesBody"></tbody>
      </table>
    </div>

    <div class="stats" id="statsBar" style="display:none">
      <span class="stat">Total: <strong id="statTotal">0</strong></span>
      <span class="stat stat-ok">OK: <strong id="statOK">0</strong></span>
      <span class="stat stat-ng">NG: <strong id="statNG">0</strong></span>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

  function stepNum(id, delta) {
    const el = document.getElementById(id);
    const v = parseInt(el.value) || 0;
    el.value = Math.max(1, v + delta);
  }

  function stepAlpha(id, delta) {
    const el = document.getElementById(id);
    const raw = el.value.trim().toUpperCase();
    const idx = ALPHA.indexOf(raw);
    if (idx === -1) { el.value = 'A'; return; }
    const next = Math.max(0, Math.min(25, idx + delta));
    el.value = ALPHA[next];
  }

  let takes = JSON.parse(localStorage.getItem('boletim_takes') || '[]');
  let counter = parseInt(localStorage.getItem('boletim_counter') || '0');

  // Restore project title
  const savedTitle = localStorage.getItem('boletim_project');
  if (savedTitle) document.getElementById('projectTitle').value = savedTitle;

  document.getElementById('projectTitle').addEventListener('input', e => {
    localStorage.setItem('boletim_project', e.target.value);
  });

  function save() {
    localStorage.setItem('boletim_takes', JSON.stringify(takes));
    localStorage.setItem('boletim_counter', counter);
  }

  function render() {
    const body = document.getElementById('takesBody');
    const empty = document.getElementById('emptyState');
    const table = document.getElementById('takesTable');
    const stats = document.getElementById('statsBar');

    if (takes.length === 0) {
      empty.style.display = 'block';
      table.style.display = 'none';
      stats.style.display = 'none';
      return;
    }

    empty.style.display = 'none';
    table.style.display = 'table';
    stats.style.display = 'flex';

    const okCount = takes.filter(t => t.status === 'OK').length;
    document.getElementById('statTotal').textContent = takes.length;
    document.getElementById('statOK').textContent = okCount;
    document.getElementById('statNG').textContent = takes.length - okCount;

    body.innerHTML = takes.map((t, i) => `
      <tr>
        <td style="color:var(--muted);font-size:.75rem">${i + 1}</td>
        <td><span class="desc-text">${escHtml(t.video) || '<em style="color:#444">—</em>'}</span></td>
        <td>${escHtml(t.arquivo)}</td>
        <td><strong>${escHtml(t.cena)}</strong></td>
        <td>${escHtml(t.plano)}</td>
        <td>${escHtml(t.take)}</td>
        <td><span class="tag-${t.status.toLowerCase()}">${t.status}</span></td>
        <td><span class="desc-text">${escHtml(t.desc) || '<em style="color:#444">—</em>'}</span></td>
        <td><button class="btn-del" onclick="deleteTake(${t.id})" title="Remover">✕</button></td>
      </tr>
    `).join('');
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function addTake() {
    const arquivo = document.getElementById('fArquivo').value.trim();
    const cena  = document.getElementById('fCena').value.trim();
    const plano = document.getElementById('fPlano').value.trim().toUpperCase();
    const take  = document.getElementById('fTake').value.trim();
    const status = document.querySelector('input[name="status"]:checked').value;
    const desc  = document.getElementById('fDesc').value.trim();
    const video = document.getElementById('projectTitle').value.trim();

    if (!arquivo || !cena || !plano || !take) {
      toast('Preencha Arquivo, Cena, Plano e Take antes de adicionar.', true);
      return;
    }

    counter++;
    takes.push({ id: counter, arquivo, cena, plano, take, status, desc, video });
    save();
    render();

    // Advance arquivo and take, reset desc/status
    stepNum('fArquivo', +1);
    stepNum('fTake', +1);
    document.getElementById('fDesc').value = '';
    document.getElementById('statusOK').checked = true;

    toast('Take adicionado!');
  }

  function deleteTake(id) {
    takes = takes.filter(t => t.id !== id);
    save();
    render();
  }

  function clearAll() {
    if (takes.length === 0) return;
    if (!confirm('Apagar todos os takes registrados?')) return;
    takes = [];
    save();
    render();
  }

  function toast(msg, err = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = err ? 'var(--ng)' : 'var(--accent)';
    el.style.color = err ? '#fff' : '#111';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  // Allow Enter key to add take
  ['fCena','fPlano','fTake'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addTake();
    });
  });

  // ---- PDF Generation ----
  function generatePDF() {
    if (takes.length === 0) {
      toast('Nenhum take para exportar.', true);
      return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

    const project = document.getElementById('projectTitle').value.trim() || 'Sem título';
    const dateStr = new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' });
    const timeStr = new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

    // Header background
    doc.setFillColor(26, 26, 26);
    doc.rect(0, 0, 297, 32, 'F');

    // Accent line
    doc.setFillColor(232, 200, 74);
    doc.rect(0, 32, 297, 1.5, 'F');

    // Title
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.setTextColor(232, 200, 74);
    doc.text('BOLETIM DE CÂMERA', 14, 14);

    // Date of diária (below title)
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(232, 200, 74);
    doc.text(dateStr, 14, 25);

    // Date/time top right
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(140, 140, 140);
    doc.text(`Gerado em ${dateStr} às ${timeStr}`, 283, 10, { align: 'right' });

    // Stats row
    const okCount  = takes.filter(t => t.status === 'OK').length;
    const ngCount  = takes.length - okCount;
    doc.setFontSize(8);
    doc.setTextColor(140, 140, 140);
    doc.text(`Total: ${takes.length}`, 283, 18, { align: 'right' });
    doc.setTextColor(76, 175, 80);
    doc.text(`OK: ${okCount}`, 265, 18, { align: 'right' });
    doc.setTextColor(244, 67, 54);
    doc.text(`NG: ${ngCount}`, 248, 18, { align: 'right' });

    // Table
    const rows = takes.map((t, i) => [
      i + 1,
      t.video || '—',
      t.arquivo,
      t.cena,
      t.plano,
      t.take,
      t.status,
      t.desc || '—'
    ]);

    doc.autoTable({
      startY: 37,
      head: [['#', 'Vídeo', 'Arquivo', 'Cena', 'Plano', 'Take', 'Status', 'Descrição / Observação']],
      body: rows,
      theme: 'grid',
      styles: {
        font: 'helvetica',
        fontSize: 9,
        cellPadding: 4,
        textColor: [220, 220, 220],
        lineColor: [50, 50, 50],
        lineWidth: 0.3,
        fillColor: [26, 26, 26],
      },
      headStyles: {
        fillColor: [36, 36, 36],
        textColor: [140, 140, 140],
        fontStyle: 'bold',
        fontSize: 7.5,
        halign: 'left',
      },
      alternateRowStyles: {
        fillColor: [30, 30, 30],
      },
      columnStyles: {
        0: { cellWidth: 10, halign: 'center', textColor: [100,100,100] },
        1: { cellWidth: 'auto', textColor: [160, 160, 160] },
        2: { cellWidth: 18, halign: 'center' },
        3: { cellWidth: 20, fontStyle: 'bold' },
        4: { cellWidth: 18 },
        5: { cellWidth: 15, halign: 'center' },
        6: { cellWidth: 20, halign: 'center' },
        7: { cellWidth: 'auto', textColor: [160, 160, 160], fontStyle: 'italic' },
      },
      didParseCell: function(data) {
        if (data.column.index === 6 && data.section === 'body') {
          const val = data.cell.raw;
          if (val === 'OK') {
            data.cell.styles.textColor = [76, 175, 80];
            data.cell.styles.fontStyle = 'bold';
          } else if (val === 'NG') {
            data.cell.styles.textColor = [244, 67, 54];
            data.cell.styles.fontStyle = 'bold';
          }
        }
      },
      margin: { left: 14, right: 14 },
    });

    // Footer
    const pageH = doc.internal.pageSize.height;
    doc.setFontSize(7);
    doc.setTextColor(80, 80, 80);
    doc.text('Boletim de Câmera', 14, pageH - 6);
    doc.text(dateStr, 283, pageH - 6, { align: 'right' });

    const filename = `boletim_${project.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_\-]/g,'')}_${dateStr.replace(/\//g,'-')}.pdf`;
    doc.save(filename);
    toast('PDF exportado com sucesso!');
  }

  render();
</script>
</body>
</html>
